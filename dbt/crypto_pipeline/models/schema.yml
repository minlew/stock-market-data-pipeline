version: 2

models:
  - name: stg_crypto_prices
    description: "Cleaned staging view of raw cryptocurrency price data."
    columns:
      - name: id
        tests:
          - not_null
          - unique
      - name: coin_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: fact_crypto_prices
    description: "Analytics-ready cryptocurrency price fact table."
    columns:
      - name: coin_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null
      - name: ingested_at
        tests:
          - not_null
